name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ── OpenCV (via vcpkg) ──────────────────────────
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/buildtrees
          key: vcpkg-opencv-${{ hashFiles('vcpkg.json') }}

      - name: Install OpenCV
        run: |
          vcpkg install opencv[core,imgproc,imgcodecs]:x64-windows-release
          vcpkg integrate install

      # ── Build ───────────────────────────────────────
      - name: Build QRMai-rs
        env:
          VCPKG_ROOT: C:/vcpkg
        run: cargo build --release

      # ── Package extension ───────────────────────────
      - name: Package Chrome Extension
        run: |
          mkdir dist
          cd extension
          7z a -tzip ..\dist\extension-chrome.zip manifest.json background.js options.html options.js icon.png
          copy manifest.firefox.json manifest.json
          7z a -tzip ..\dist\extension-firefox.zip manifest.json background.js options.html options.js icon.png
          del manifest.json
          cd ..

      # ── Upload artifacts ────────────────────────────
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: QRMai-rs-windows
          path: |
            target/release/QRMai-rs.exe
            dist/extension-chrome.zip
            dist/extension-firefox.zip
